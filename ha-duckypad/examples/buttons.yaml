# Copy this to /share/ha-duckypad/buttons.yaml on Home Assistant.
# Restart the HA DuckyPad add-on after saving changes.

button_mappings:
  - key: KEY_F12
    action: button.windowspc_start_calc
  - key: KEY_F13
    action: switch.elegoo
  - key: KEY_F14
    action: switch.voron
  - key: KEY_F15
    action: script.duckypad_open_home_assistant_on_pc

