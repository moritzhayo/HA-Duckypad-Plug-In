# HA DuckyPad config limit test
# Copy this to /config/ha-duckypad/buttons.yaml to test whether the add-on
# can load a large central mapping file.
#
# Expected log after restart:
#   Loaded 100 button mapping(s)
#
# Note: this tests config parsing and loading. Very high F-key names such as
# KEY_F80 only trigger if your DuckyPad/Linux setup actually emits that exact
# key name in the add-on log.

