name: HA DuckyPad
version: "0.7.0"
slug: ha_duckypad
description: Trigger Home Assistant services from DuckyPad Pro USB key events.
url: https://github.com/moritzhayo/HA-Duckypad-Plug-In
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
homeassistant_api: true
udev: true
apparmor: false
devices:
  - /dev/input
  - /dev/hidraw0
options:
  device_path: /dev/input/by-id/usb-dekuNukem_duckyPad_Pro_DP24_A1E7C3D4-event-kbd
  debounce_ms: 500
  hidraw_path: auto
  enable_hid_debug: false
  enable_hid_commands: false
  enable_ha_event_commands: false
  ha_event_command_type: ha_duckypad_hid_command
  enable_entity_state_events: false
  hid_commands_on_start: []
  entity_state_sync_interval: 0
  entity_state_mappings: []
  button_mappings:
    - key: KEY_F13
      service: switch.toggle
      entity_id: switch.elegoo
    - key: KEY_F14
      service: switch.toggle
      entity_id: switch.voron
schema:
  device_path: device(subsystem=input)
  debounce_ms: int(0,5000)
  hidraw_path: str
  enable_hid_debug: bool
  enable_hid_commands: bool
  enable_ha_event_commands: bool
  ha_event_command_type: str
  enable_entity_state_events: bool
  entity_state_sync_interval: int(0,86400)
  hid_commands_on_start:
    - hid_command: str
      profile_number: int(1,255)?
      profile_name: str?
      led_index: int(0,19)?
      red: int(0,255)?
      green: int(0,255)?
      blue: int(0,255)?
      gv_index: int(0,31)?
      gv_value: int?
  entity_state_mappings:
    - entity_id: str
      gv_index: int(0,31)
      attribute: str?
      state_type: list(auto|bool|number)?
      on_value: int?
      off_value: int?
      default_value: int?
      on_states: str?
      off_states: str?
  button_mappings:
    - key: str
      service: str?
      entity_id: str?
      hid_command: str?
      profile_number: int(1,255)?
      profile_name: str?
      led_index: int(0,19)?
      red: int(0,255)?
      green: int(0,255)?
      blue: int(0,255)?
      gv_index: int(0,31)?
      gv_value: int?
